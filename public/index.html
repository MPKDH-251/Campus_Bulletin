<!DOCTYPE html>
<html>
<head>
  <title>Campus Bulletin Board</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js"></script>
</head>
<!-- College Navbar -->
<nav class="navbar">
  <div class="navbar-content">
    <img src="https://upload.wikimedia.org/wikipedia/en/7/72/Gec_Sreekrishnapuram_Logo.png" alt="College Logo" class="college-logo">
    <span class="college-name">Government Engineering College, Palakkad</span>
    <div class="nav-actions">
      <button id="googleSignInBtn" style="display:none;">Sign in with Google</button>
      <button id="logoutBtn" style="display:none;">Logout</button>
    </div>
  </div>
</nav>
<body>
  <div class="container">
    <h1>📢 Campus Bulletin</h1>
    <div id="message" class="message"></div>
    <div id="auth">
      <button id="googleSignInBtn" style="display:none;">Sign in with Google</button>
    </div>

    <div id="navButtons" style="display:none;">
      <button onclick="window.location.href='add.html'">Add Event</button>
      <button onclick="window.location.href='my_events.html'">My Events</button>
      <!-- <button id="logoutBtn">Logout</button> -->
    </div>

    <h2>📅 Today's Events</h2>
    <div id="eventList"></div>
  </div>
</body>
</html>
